<!DOCTYPE html>
<html>

<head>

    <title>Isimu Sense Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- ✅ ADD THIS (MISSING ICONS) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: url("{{ url_for('static', filename='images/farm_bg.jpg') }}") no-repeat center center fixed;
            background-size: cover;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
        }

        .toggle-password {
            position: absolute;
            top: 50%;
            right: 15px;
            transform: translateY(-50%);
            cursor: pointer;
            color: #6c757d;
        }

        /* Caps lock warning */
        .caps-warning {
            color: #dc3545;
            font-size: 0.85rem;
            display: none;
        }
    </style>

</head>

<body>

    <div class="container">

        <div class="row justify-content-center align-items-center vh-100">

            <div class="col-md-4">

                <div class="card shadow-lg border-0 login-card">

                    <div class="card-body p-4">

                        <h3 class="text-center mb-4">Isimu Sense 🌾</h3>

                        {% with messages = get_flashed_messages(with_categories=true) %}
                        {% if messages %}
                        {% for category, message in messages %}

                        <div class="alert alert-{{ category }} alert-dismissible fade show">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>

                        {% endfor %}
                        {% endif %}
                        {% endwith %}

                        <form method="POST">

                            <div class="mb-3">
                                <input type="text" name="username" class="form-control" placeholder="Username" required>
                            </div>

                            <div class="mb-3 position-relative">

                                <input type="password" id="password" name="password" class="form-control pe-5"
                                    placeholder="Password" required onkeyup="checkCaps(event)">

                                <i class="bi bi-eye-slash toggle-password"
                                    onclick="togglePassword('password', this)"></i>

                                <!-- ✅ CAPS LOCK WARNING -->
                                <div id="caps-warning" class="caps-warning mt-1">
                                    Caps Lock is ON ⚠️
                                </div>

                            </div>

                            <button class="btn btn-success w-100">
                                Login
                            </button>

                        </form>

                    </div>
                </div>

            </div>

        </div>

    </div>

    <!-- TOGGLE SCRIPT -->
    <script>
        function togglePassword(fieldId, icon) {
            const input = document.getElementById(fieldId);

            if (input.type === "password") {
                input.type = "text";
                icon.classList.remove("bi-eye-slash");
                icon.classList.add("bi-eye");
            } else {
                input.type = "password";
                icon.classList.remove("bi-eye");
                icon.classList.add("bi-eye-slash");
            }
        }
    </script>

    <!-- CAPS LOCK SCRIPT -->
    <script>
        function checkCaps(event) {
            const warning = document.getElementById("caps-warning");

            if (event.getModifierState && event.getModifierState("CapsLock")) {
                warning.style.display = "block";
            } else {
                warning.style.display = "none";
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
