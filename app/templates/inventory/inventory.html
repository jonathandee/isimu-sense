{% extends "base.html" %}

{% block title %}Inventory{% endblock %}

{% block content %}

<h1 class="mb-4">Inventory 📦</h1>

<p class="text-muted">Manage farm inventory.</p>

<div class="row">

    <!-- Categories -->
    <div class="col-md-4">
        <div class="card shadow-sm">
            <div class="card-body">

                <h5 class="card-title">Categories</h5>
                <p class="card-text">Manage inventory categories.</p>

                <a href="{{ url_for('main.inventory_categories') }}" class="btn btn-success">
                    Open
                </a>

            </div>
        </div>
    </div>

    <!-- Items -->
    <div class="col-md-4">
        <div class="card shadow-sm">
            <div class="card-body">

                <h5 class="card-title">Items</h5>
                <p class="card-text">Manage inventory items.</p>

                <a href="{{ url_for('main.inventory_items') }}" class="btn btn-success">
                    Open
                </a>

            </div>
        </div>
    </div>

</div>


{% endblock %}
